spring:
  datasource:
    url: ${DATABASE_URL}

    username: ${DB_USER}

    password: ${DB_PASSWORD}

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.zaxxer.hikari: DEBUG

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}