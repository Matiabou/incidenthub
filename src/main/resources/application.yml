spring:
  datasource:
    url: ${DATABASE_URL}

    username: ${DB_USER}

    password: ${DB_PASSWORD}

    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 10000

  mvc:
    throw-exception-if-no-handler-found: true

  web:
    resources:
      add-mappings: false

  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false

    show-sql: true

    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.zaxxer.hikari: WARN

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}